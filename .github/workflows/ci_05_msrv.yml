name: CI(05) MSRV (Rust 1.78)

# Monthly cron + workflow_dispatch. File index matches day-of-month.
#
# Verifies the declared `rust-version = "1.78"` in Cargo.toml still builds
# the crate (caught early if a dependency or our code drifts above MSRV).

on:
  # One time per month, on the 5th at 00:00 UTC
  schedule:
    - cron: "0 0 5 * *"
  # Manually triggered
  workflow_dispatch:

jobs:
  msrv-linux:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: "1.78"
          override: true
      - name: cargo build (MSRV)
        run: |
          cargo build --release --all-features
      - name: cargo test --lib (MSRV — lib tests only to keep proptest dep boundary clean)
        run: |
          cargo test --release --lib
