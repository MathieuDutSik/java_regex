name: CI(03) Benchmark vs regex / fancy-regex / onig

# Monthly cron + workflow_dispatch. File index matches day-of-month.

on:
  # One time per month, on the 3rd at 00:00 UTC
  schedule:
    - cron: "0 0 3 * *"
  # Manually triggered
  workflow_dispatch:

jobs:
  bench-linux:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Install Oniguruma (native dep for the `onig` crate)
        run: |
          sudo apt-get update
          sudo apt-get install -y libonig-dev
      - name: Run benchmark
        run: |
          cargo run --release --example bench_engines
