name: CI(02) Clippy

# Monthly cron + workflow_dispatch. File index matches day-of-month.

on:
  # One time per month, on the 2nd at 00:00 UTC
  schedule:
    - cron: "0 0 2 * *"
  # Manually triggered
  workflow_dispatch:

jobs:
  clippy-linux:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: clippy
      - name: cargo clippy --all-targets --all-features
        run: |
          cargo clippy --all-targets --all-features -- -D warnings
