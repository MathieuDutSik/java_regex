name: CI(01) Tests

# Monthly cron + workflow_dispatch. File index matches day-of-month:
# ci_NN_*.yml runs on day NN.

on:
  # One time per month, on the 1st at 00:00 UTC
  schedule:
    - cron: "0 0 1 * *"
  # Manually triggered
  workflow_dispatch:

jobs:
  build-linux:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: cargo test (release, includes JSONL OpenJDK test vectors)
        run: |
          cargo test --release --all-targets
